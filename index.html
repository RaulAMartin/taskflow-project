<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Taskflow Project</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Taskflow</h1>
  </header>

  <main>

    <aside>
      <h2>Categorías</h2>
      <ul>
        <li>Trabajo</li>
        <li>Personal</li>
        <li>Urgente</li>
      </ul>
    </aside>

    <section class="tasks">
      <div class="task">
        <h3>Terminar práctica DAM</h3>
        <span class="category">Estudio</span>
        <span class="priority high">Alta</span>
      </div>

      <div class="task">
        <h3>Revisar correos</h3>
        <span class="category">Trabajo</span>
        <span class="priority low">Baja</span>
      </div>
    </section>

  </main>

</body>
</html>
