<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskflow</title>

  <link rel="stylesheet" href="./dist/output.css" />
</head>

<body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <!-- TOP BAR -->
  <header class="border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-950/60">
    <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
      <!-- Brand -->
      <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900" aria-hidden="true">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            class="h-5 w-5 text-slate-900 dark:text-slate-100"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M4.75 6.75C4.75 5.7835 5.5335 5 6.5 5h10.25c.8284 0 1.5.67157 1.5 1.5v11.75c0 .4142-.3358.75-.75.75H7.5a2.75 2.75 0 0 0-2.75 2.75V6.75Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 19h10.25" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 19a2.75 2.75 0 1 0 0 5.5" />
          </svg>
        </div>

        <div class="leading-tight">
          <h1 class="text-lg font-semibold tracking-tight">Taskflow</h1>
          <p class="text-sm text-slate-600 dark:text-slate-400">Organiza tu día con claridad</p>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <!-- Search desktop -->
        <div class="relative hidden sm:block">
          <label for="topSearchInput" class="sr-only">Buscar tareas en la barra superior</label>
          <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true">⌕</span>
          <input
            id="topSearchInput"
            type="text"
            placeholder="Buscar tareas..."
            class="w-64 rounded-lg border border-slate-200 bg-white py-2 pl-9 pr-3 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:placeholder:text-slate-500 dark:focus:ring-slate-600 transition"
          />
        </div>

        <!-- Dark mode toggle -->
        <button
          id="themeToggle"
          type="button"
          class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:hover:bg-slate-800 dark:focus:ring-slate-600 transition"
          aria-label="Cambiar tema"
          title="Cambiar tema"
        >
          🌙
        </button>
      </div>
    </div>

    <!-- Search móvil -->
    <div class="sm:hidden px-4 pb-4">
      <div class="relative">
        <label for="topSearchInputMobile" class="sr-only">Buscar tareas en móvil</label>
        <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true">⌕</span>
        <input
          id="topSearchInputMobile"
          type="text"
          placeholder="Buscar tareas..."
          class="w-full rounded-lg border border-slate-200 bg-white py-2 pl-9 pr-3 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:placeholder:text-slate-500 dark:focus:ring-slate-600 transition"
        />
      </div>
    </div>
  </header>

  <!-- WRAP -->

      <header class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
          <div>
            <h2 class="text-base font-semibold">Mis tareas</h2>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">
              Añade, completa, edita y elimina tareas. Todo se guarda en tu navegador.
            </p>
          </div>

          <div class="flex flex-col gap-2 xl:flex-row xl:flex-wrap xl:items-center xl:justify-end">
            <!-- Filtro por estado -->
            <div class="flex flex-wrap gap-2 xl:justify-end" aria-label="Filtro por estado">
              <button
                id="viewAll"
                type="button"
                class="rounded-lg border border-slate-200 bg-slate-900 px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-800 dark:border-slate-800 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white"
              >
                Todas
              </button>

              <button
                id="viewPending"
                type="button"
                class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"
              >
                Pendientes
              </button>

              <button
                id="viewCompleted"
                type="button"
                class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:bg-slate-800"
              >
                Completadas
              </button>
            </div>

            <!-- Ordenación -->
            <div>
              <label for="sortTasks" class="sr-only">Ordenar tareas</label>
              <select
                id="sortTasks"
                class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-900 dark:focus:ring-slate-600 transition"
              >
                <option value="newest">Más recientes</option>
                <option value="oldest">Más antiguas</option>
                <option value="priority">Por prioridad</option>
                <option value="alphabetical">A-Z</option>
              </select>
            </div>
          </div>
        </div>
      </header>

      <!-- Composer -->
      <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <form id="taskForm" class="grid gap-3 md:grid-cols-12">
          <div class="md:col-span-5">
            <label for="taskInput" class="sr-only">Título de la tarea</label>
            <input
              id="taskInput"
              type="text"
              placeholder="Escribe una tarea y pulsa Enter..."
              required
              class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-base placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-950 dark:placeholder:text-slate-500 dark:focus:ring-slate-600 transition"
            />
          </div>

          <div class="md:col-span-3">
            <label for="taskCategory" class="sr-only">Categoría</label>
            <select
              id="taskCategory"
              aria-label="Categoría"
              class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-950 dark:focus:ring-slate-600 transition"
            >
              <option value="Estudio">Estudio</option>
              <option value="Trabajo">Trabajo</option>
              <option value="Personal">Personal</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <label for="taskPriority" class="sr-only">Prioridad</label>
            <select
              id="taskPriority"
              aria-label="Prioridad"
              class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-base focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-950 dark:focus:ring-slate-600 transition"
            >
              <option value="Alta">Alta</option>
              <option value="Media">Media</option>
              <option value="Baja">Baja</option>
            </select>
          </div>

          <div class="md:col-span-2">
            <button
              type="submit"
              class="w-full rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:bg-slate-100 dark:text-slate-900 dark:hover:bg-white dark:focus:ring-slate-600 transition"
            >
              Añadir
            </button>
          </div>
        </form>

        <p id="formMessage" class="mt-3 hidden rounded-lg border px-3 py-2 text-sm"></p>

        <div class="mt-3">
          <label for="searchInput" class="sr-only">Filtrar tareas por texto</label>
          <input
            id="searchInput"
            type="text"
            placeholder="Filtrar tareas por texto..."
            class="w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-base placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-950 dark:placeholder:text-slate-500 dark:focus:ring-slate-600 transition"
          />
        </div>

        <div class="mt-3 flex flex-col gap-2 sm:flex-row">
          <button
            id="markAllDone"
            type="button"
            class="rounded-lg border border-slate-200 bg-white px-4 py-2 text-sm font-medium hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400 dark:border-slate-800 dark:bg-slate-950 dark:hover:bg-slate-800 dark:focus:ring-slate-600 transition"
          >
            Marcar todas como completadas
          </button>

          <button
            id="clearCompleted"
            type="button"
            class="rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-sm font-medium text-red-700 hover:bg-red-100 focus:outline-none focus:ring-2 focus:ring-red-400 dark:border-red-900/60 dark:bg-red-950/40 dark:text-red-200 dark:hover:bg-red-950/60 dark:focus:ring-red-500 transition"
          >
            Borrar completadas
          </button>
        </div>
      </section>

      <!-- Task list -->
      <section id="taskList" class="flex flex-col gap-3" aria-live="polite"></section>
    </section>

<main class="mx-auto grid max-w-6xl grid-cols-1 gap-4 px-4 py-6 lg:grid-cols-12 lg:items-start">
  <!-- SIDEBAR -->
  <aside class="order-1 space-y-4 lg:col-span-4 xl:col-span-3">
    <!-- Resumen -->
    <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
      <h2 class="text-sm font-semibold text-slate-900 dark:text-slate-100">Resumen</h2>

      <div class="mt-3 grid grid-cols-2 gap-3">
        <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-center dark:border-slate-800 dark:bg-slate-950">
          <div class="text-xl font-semibold" id="statTotal">0</div>
          <div class="mt-1 text-xs text-slate-600 dark:text-slate-400">Totales</div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-center dark:border-slate-800 dark:bg-slate-950">
          <div class="text-xl font-semibold" id="statCompleted">0</div>
          <div class="mt-1 text-xs text-slate-600 dark:text-slate-400">Completadas</div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-center dark:border-slate-800 dark:bg-slate-950">
          <div class="text-xl font-semibold" id="statPending">0</div>
          <div class="mt-1 text-xs text-slate-600 dark:text-slate-400">Pendientes</div>
        </div>

        <div class="rounded-lg border border-slate-200 bg-slate-50 p-3 text-center dark:border-slate-800 dark:bg-slate-950">
          <div class="text-xl font-semibold" id="statHigh">0</div>
          <div class="mt-1 text-xs text-slate-600 dark:text-slate-400">Urgentes</div>
        </div>
      </div>
    </section>

    <!-- Categorías -->
    <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
      <div class="flex items-center justify-between gap-2">
        <h2 class="text-sm font-semibold">Categorías</h2>
        <button
          id="clearCategoryFilters"
          type="button"
          class="text-xs font-medium text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition"
        >
          Limpiar
        </button>
      </div>

      <ul class="mt-3 space-y-2">
        <li>
          <button
            type="button"
            data-category="Estudio"
            aria-pressed="false"
            class="category-filter flex w-full items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-left transition hover:border-slate-300 hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-slate-700 dark:hover:bg-slate-900"
          >
            <span class="flex items-center gap-2 text-sm">
              <span class="h-2.5 w-2.5 rounded-full bg-indigo-500"></span>
              <span>Estudio</span>
            </span>
            <span class="rounded-full bg-slate-200 px-2 py-0.5 text-xs font-semibold text-slate-800 dark:bg-slate-800 dark:text-slate-100" id="pillStudy">0</span>
          </button>
        </li>

        <li>
          <button
            type="button"
            data-category="Trabajo"
            aria-pressed="false"
            class="category-filter flex w-full items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-left transition hover:border-slate-300 hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-slate-700 dark:hover:bg-slate-900"
          >
            <span class="flex items-center gap-2 text-sm">
              <span class="h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
              <span>Trabajo</span>
            </span>
            <span class="rounded-full bg-slate-200 px-2 py-0.5 text-xs font-semibold text-slate-800 dark:bg-slate-800 dark:text-slate-100" id="pillWork">0</span>
          </button>
        </li>

        <li>
          <button
            type="button"
            data-category="Personal"
            aria-pressed="false"
            class="category-filter flex w-full items-center justify-between rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-left transition hover:border-slate-300 hover:bg-slate-100 dark:border-slate-800 dark:bg-slate-950 dark:hover:border-slate-700 dark:hover:bg-slate-900"
          >
            <span class="flex items-center gap-2 text-sm">
              <span class="h-2.5 w-2.5 rounded-full bg-pink-500"></span>
              <span>Personal</span>
            </span>
            <span class="rounded-full bg-slate-200 px-2 py-0.5 text-xs font-semibold text-slate-800 dark:bg-slate-800 dark:text-slate-100" id="pillPersonal">0</span>
          </button>
        </li>
      </ul>

      <p class="mt-3 text-xs text-slate-500 dark:text-slate-400">
        Puedes seleccionar varias categorías a la vez.
      </p>
    </section>

    <!-- Filtros -->
    <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
      <h2 class="text-sm font-semibold">Filtros de prioridad</h2>

      <div class="mt-3 space-y-2 text-sm">
        <label class="flex items-center gap-2">
          <input id="filterHigh" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-950 dark:focus:ring-slate-600" />
          <span class="text-slate-700 dark:text-slate-300">Mostrar alta prioridad</span>
        </label>

        <label class="flex items-center gap-2">
          <input id="filterMid" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-950 dark:focus:ring-slate-600" />
          <span class="text-slate-700 dark:text-slate-300">Mostrar media prioridad</span>
        </label>

        <label class="flex items-center gap-2">
          <input id="filterLow" type="checkbox" checked class="h-4 w-4 rounded border-slate-300 text-slate-900 focus:ring-slate-400 dark:border-slate-700 dark:bg-slate-950 dark:focus:ring-slate-600" />
          <span class="text-slate-700 dark:text-slate-300">Mostrar baja prioridad</span>
        </label>
      </div>
    </section>
  </aside>

  <!-- CONTENT -->
  <section class="order-2 space-y-4 lg:col-span-8 xl:col-span-9">

  <script src="app.js"></script>
</body>
</html>
