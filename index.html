<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taskflow</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
<div class="brand">
<div class="logo" aria-hidden="true"></div>
<div class="brand-text">
<h1>Taskflow</h1>
<p>Organiza tu día con claridad</p>
</div>
</div>

<div class="actions">
<div class="search">
<span class="search-icon" aria-hidden="true">⌕</span>
<input id="topSearchInput" type="text" placeholder="Buscar tareas..." />
</div>
<button id="newTaskBtn" class="btn-primary" type="button">+ Nueva tarea</button>
</div>
</header>

<!-- Importante: wrapper para permitir scroll horizontal si la ventana es estrecha -->
<div class="page-wrap">
<main class="layout">
<aside class="sidebar">
<section class="panel">
<h2>Resumen</h2>
<div class="stats">
<div class="stat">
<div class="stat-value" id="statTotal">0</div>
<div class="stat-label">Totales</div>
</div>
<div class="stat">
<div class="stat-value" id="statPending">0</div>
<div class="stat-label">Pendientes</div>
</div>
<div class="stat">
<div class="stat-value" id="statHigh">0</div>
<div class="stat-label">Urgentes</div>
</div>
</div>
</section>

<section class="panel">
<h2>Categorías</h2>
<ul class="cat-list">
<li class="cat-item">
<span class="left">
<span class="dot dot-study"></span>
<span>Estudio</span>
</span>
<span class="pill" id="pillStudy">0</span>
</li>

<li class="cat-item">
<span class="left">
<span class="dot dot-work"></span>
<span>Trabajo</span>
</span>
<span class="pill" id="pillWork">0</span>
</li>

<li class="cat-item">
<span class="left">
<span class="dot dot-personal"></span>
<span>Personal</span>
</span>
<span class="pill" id="pillPersonal">0</span>
</li>
</ul>
</section>

<section class="panel">
<h2>Filtros</h2>
<div class="filters">
<label class="check">
<input id="filterHigh" type="checkbox" checked />
<span>Mostrar alta prioridad</span>
</label>
<label class="check">
<input id="filterMid" type="checkbox" checked />
<span>Mostrar media prioridad</span>
</label>
<label class="check">
<input id="filterLow" type="checkbox" checked />
<span>Mostrar baja prioridad</span>
</label>
</div>
</section>
</aside>

<section class="content">
<header class="content-head">
<div>
<h2>Mis tareas</h2>
<p class="muted">Añade, completa y elimina tareas (se guardan en tu navegador).</p>
</div>

<div class="segmented" aria-label="Vistas">
<button class="seg active" type="button">Todas</button>
<button class="seg" type="button">Hoy</button>
<button class="seg" type="button">Semana</button>
</div>
</header>

<section class="composer">
<form id="taskForm" class="task-form">
<input id="taskInput" type="text" placeholder="Escribe una tarea y pulsa Enter..." required />

<select id="taskCategory" aria-label="Categoría">
<option value="Estudio">Estudio</option>
<option value="Trabajo">Trabajo</option>
<option value="Personal">Personal</option>
</select>

<select id="taskPriority" aria-label="Prioridad">
<option value="Alta">Alta</option>
<option value="Media">Media</option>
<option value="Baja">Baja</option>
</select>

<button type="submit" class="btn-primary">Añadir</button>
</form>

<div class="search-row">
<input id="searchInput" type="text" placeholder="Filtrar tareas por texto..." />
</div>
</section>

<section id="taskList" class="grid"></section>
</section>

</main>
</div>

<script src="app.js"></script>
</body>
</html>
